<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background: Dark Chocolate Brown (#5A3A31) with rounded corners -->
  <rect width="512" height="512" rx="96" fill="#5A3A31" />
  
  <!-- 'vaci.' Monoline Geometry in Crisp White -->
  <g stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Letter 'v' -->
    <path d="M 68 190 L 125 340 L 182 190" />
    
    <!-- Letter 'a' (Circular loop & vertical drop stem) -->
    <circle cx="255" cy="265" r="50" />
    <path d="M 305 265 L 305 340" />
    
    <!-- Letter 'c' -->
    <path d="M 410 222 A 50 50 0 1 0 410 308" />
    
    <!-- Letter 'i' (Stem) -->
    <line x1="442" y1="210" x2="442" y2="340" />
  </g>
  
  <!-- Dots on 'i' & baseline period '.' -->
  <g fill="#FFFFFF">
    <circle cx="442" cy="168" r="14" />
    <circle cx="478" cy="334" r="12" />
  </g>
</svg>